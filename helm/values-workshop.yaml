    limits:
      cpu: "1"
      memory: 1Gi

loginservice:
  resources:
    requests:
      cpu: 20m
      memory: 350Mi
    limits:
      cpu: 200m
      memory: 450Mi

manager:
  resources:
    requests:
      cpu: 30m
      memory: 400Mi
    limits:
      cpu: 200m
      memory: 600Mi

offerservice:
